<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura — Professores da Natureza | Biomimética</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #040a0f;
            --cyan: #00f5d4;
            --purple: #a29bfe;
            --gold: #ffd93d;
            --green: #55efc4;
            --coral: #fd79a8;
            --glass: rgba(255, 255, 255, 0.025);
            --border: rgba(0, 245, 212, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: #dfe6e9;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated ocean background */
        .ocean-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(ellipse at 20% 80%, rgba(0, 180, 180, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(100, 0, 200, 0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 0, 50, 0.8) 0%, #040a0f 100%);
        }

        .wave {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            z-index: -1;
            background: linear-gradient(90deg, var(--cyan), var(--purple), var(--cyan));
            animation: waveShift 6s ease-in-out infinite alternate;
            opacity: 0.3;
        }

        @keyframes waveShift {
            from {
                transform: scaleX(1);
            }

            to {
                transform: scaleX(1.05) translateX(-3%);
            }
        }

        /* Header */
        header {
            text-align: center;
            padding: 50px 20px 30px;
            position: relative;
        }

        .logo-tag {
            font-size: 0.7em;
            letter-spacing: 5px;
            color: var(--cyan);
            text-transform: uppercase;
            opacity: 0.7;
        }

        h1 {
            font-size: clamp(1.8em, 4vw, 2.8em);
            font-weight: 700;
            background: linear-gradient(90deg, var(--cyan), var(--purple), var(--gold));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0 14px;
        }

        .subtitle {
            max-width: 560px;
            margin: 0 auto;
            font-size: 0.88em;
            line-height: 1.7;
            opacity: 0.5;
        }

        /* Search */
        .search-bar {
            max-width: 480px;
            margin: 30px auto 0;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            background: rgba(0, 245, 212, 0.06);
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px 20px 12px 50px;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--cyan);
        }

        .search-bar input::placeholder {
            opacity: 0.4;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1em;
            opacity: 0.5;
        }

        /* Goal selector */
        .goal-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .goal-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #ccc;
            padding: 7px 16px;
            border-radius: 50px;
            font-size: 0.78em;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s;
        }

        .goal-btn:hover,
        .goal-btn.active {
            border-color: var(--cyan);
            color: var(--cyan);
            background: rgba(0, 245, 212, 0.08);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 10px auto 60px;
            padding: 0 20px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--card-color, var(--cyan));
            opacity: 0.6;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--card-color, var(--cyan));
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .card.hidden {
            display: none;
        }

        .card-emoji {
            font-size: 2.2em;
            margin-bottom: 10px;
            display: block;
        }

        .card-title {
            font-size: 1.05em;
            font-weight: 700;
            color: var(--card-color, var(--cyan));
            margin-bottom: 4px;
        }

        .card-class {
            font-size: 0.72em;
            opacity: 0.4;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .card-super {
            font-size: 0.82em;
            line-height: 1.6;
            opacity: 0.75;
            margin-bottom: 14px;
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }

        .tag {
            font-size: 0.68em;
            padding: 3px 10px;
            border-radius: 50px;
            opacity: 0.8;
            border: 1px solid var(--card-color, var(--cyan));
            color: var(--card-color, var(--cyan));
        }

        .lesson-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 12px;
            font-size: 0.78em;
            line-height: 1.7;
            border-left: 2px solid var(--card-color, var(--cyan));
            margin-top: 10px;
        }

        .lesson-label {
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
            margin-bottom: 4px;
        }

        .source-tag {
            margin-top: 10px;
            font-size: 0.65em;
            opacity: 0.35;
            font-style: italic;
        }

        /* Detail panel */
        #detail-panel {
            position: fixed;
            top: 0;
            right: -520px;
            bottom: 0;
            width: min(500px, 100vw);
            background: #06101a;
            border-left: 1px solid rgba(0, 245, 212, 0.2);
            padding: 40px 30px;
            overflow-y: auto;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }

        #detail-panel.open {
            right: 0;
        }

        .panel-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.4em;
            cursor: pointer;
            opacity: 0.5;
        }

        .panel-close:hover {
            opacity: 1;
        }

        .panel-section {
            margin-bottom: 24px;
        }

        .panel-label {
            font-size: 0.68em;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.4;
            margin-bottom: 8px;
        }

        .protocol-step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.85em;
            line-height: 1.6;
        }

        .protocol-num {
            min-width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--card-color, var(--cyan));
            color: #000;
            font-size: 0.7em;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .human-box {
            background: rgba(0, 245, 212, 0.05);
            border: 1px solid rgba(0, 245, 212, 0.15);
            border-radius: 12px;
            padding: 16px;
            font-size: 0.85em;
            line-height: 1.7;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.72em;
            opacity: 0.25;
        }
    </style>
</head>

<body>

        function buildCards() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            SPECIES.forEach((sp, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.setProperty('--card-color', sp.color);
                card.dataset.search = `${sp.name} ${sp.superpoder} ${sp.tags.join(' ')} ${sp.mecanismo}`.toLowerCase();
                card.onclick = () => openPanel(idx);

                card.innerHTML = `
                    <span class="card-emoji">${sp.emoji}</span>
                    <div class="card-title">${sp.name}</div>
                    <div class="card-class">${sp.classe}</div>
                    <div class="card-super">${sp.superpoder}</div>
                    <div class="tag-row">${sp.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                    <div class="lesson-box">
                        <div class="lesson-label">💡 Lição para a humanidade</div>
                        ${sp.licao}
                    </div>
                    <div class="source-tag">🔬 ${sp.fonte} · ⏱ ${sp.tempo}</div>
                `;
                grid.appendChild(card);
            });
        }

        function filterCards() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                card.classList.toggle('hidden', !card.dataset.search.includes(query));
            });
        }

        function setGoal(keyword, btn) {
            document.querySelectorAll('.goal-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('searchInput').value = keyword;
            filterCards();
        }

        function openPanel(idx) {
            const sp = SPECIES[idx];
            document.documentElement.style.setProperty('--card-color', sp.color);

            const content = document.getElementById('panel-content');
            content.innerHTML = `
                <div style="font-size:3em; margin-bottom:10px;">${sp.emoji}</div>
                <div style="font-size:1.6em; font-weight:700; color:${sp.color}; margin-bottom:4px;">${sp.name}</div>
                <div style="font-size:0.72em; opacity:0.4; letter-spacing:1px; text-transform:uppercase; margin-bottom:20px;">${sp.classe}</div>

                <div class="panel-section">
                    <div class="panel-label">🦾 Superpoder</div>
                    <div style="font-size:0.9em; line-height:1.7; opacity:0.85;">${sp.superpoder}</div>
                </div>

                <div class="panel-section">
                    <div class="panel-label">⚙️ Mecanismo Biológico</div>
                    <div style="font-size:0.85em; line-height:1.7; opacity:0.75;">${sp.mecanismo}</div>
                </div>

                <div class="panel-section">
                    <div class="panel-label">🧬 Genes Envolvidos</div>
                    <div style="display:flex; flex-wrap:wrap; gap:6px;">
                        ${sp.genes.map(g => `<span style="font-size:0.7em; padding:4px 12px; border-radius:50px; border:1px solid ${sp.color}; color:${sp.color};">${g}</span>`).join('')}
                    </div>
                </div>

                <div class="panel-section">
                    <div class="panel-label">🌱 Lição para a Humanidade</div>
                    <div class="human-box" style="border-color:${sp.color}30; background:${sp.color}08;">
                        ${sp.licao}
                    </div>
                </div>

                <div class="panel-section">
                    <div class="panel-label">📋 Protocolo de Ativação</div>
                    ${sp.protocolo.map((p, i) => `
                        <div class="protocol-step">
                            <div class="protocol-num" style="background:${sp.color};">${i + 1}</div>
                            <div>${p}</div>
                        </div>
                    `).join('')}
                </div>

                <div style="font-size:0.7em; opacity:0.3; margin-top:10px;">
                    🔬 Fontes: ${sp.fonte}<br>⏱ Tempo: ${sp.tempo}
                </div>
            `;

            document.getElementById('detail-panel').classList.add('open');
        }

        function closePanel() {
            document.getElementById('detail-panel').classList.remove('open');
        }

        buildCards();
    </script>
</body>

</html>
